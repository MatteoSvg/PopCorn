<div class="container border border-primary my-5 py-3 rounded-4">
  <div class="row align-items-lg-center">
    <div class="col-12 col-md-4"><img [src]="getPosterPath()"/></div>
    <div class="col-12 col-md-8
    ">
      <h2>{{ movie.title }}</h2>
      <p>{{ movie.overview }}</p>
      <app-button
        (btnClicked)="onGetRandomMovie()"
        title="Mostrami un altro film"
      />
    </div>
  </div>
</div>
